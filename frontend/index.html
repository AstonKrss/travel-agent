<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业差旅智能 Agent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">✈</div>
                <h1>
                    Travel Agent
                    <span>企业差旅 · 智能助手</span>
                </h1>
                <div class="connection-badge">
                    <div class="connection-dot" id="connDot"></div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-tab="chat">
                    <span class="nav-icon">💬</span>
                    <span>智能对话</span>
                    <span class="nav-arrow">→</span>
                </a>
                <a href="#" class="nav-item" data-tab="graph">
                    <span class="nav-icon">🔀</span>
                    <span>Agent 流程</span>
                    <span class="nav-arrow">→</span>
                </a>
                <a href="#" class="nav-item" data-tab="state">
                    <span class="nav-icon">📊</span>
                    <span>状态监控</span>
                    <span class="nav-arrow">→</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-settings">
                    <label>User ID</label>
                    <input type="text" id="userId" value="emp001" placeholder="emp001">
                    <label>Thread ID</label>
                    <input type="text" id="threadId" placeholder="自动生成" readonly>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="main-area">
            <!-- Chat Tab -->
            <div id="chatTab" class="tab-content active">
                <div class="chat-wrapper">
                    <!-- Node Progress Bar -->
                    <div class="node-progress" id="progressBar"></div>

                    <!-- Messages -->
                    <div id="messages" class="messages-area">
                        <div class="welcome-card" id="welcomeCard">
                            <span class="welcome-icon">🛫</span>
                            <h2>企业差旅智能 Agent</h2>
                            <p>基于 LangGraph 的多节点编排 · 意图识别 → 信息提取 → 方案查询 → 智能推荐 → 预订执行</p>
                            <div class="quick-prompts">
                                <button onclick="usePrompt('你好')">👋 你好</button>
                                <button onclick="usePrompt('从北京到上海，下周一，1人')">🚄 北京 → 上海 下周一</button>
                                <button onclick="usePrompt('广州到深圳明天2人')">✈️ 广州 → 深圳 明天</button>
                                <button onclick="usePrompt('成都到北京下周三，需要住宿')">🏨 成都 → 北京 含酒店</button>
                            </div>
                        </div>
                    </div>

                    <!-- Recommendations Panel -->
                    <div id="recPanel" class="rec-panel" style="display:none">
                        <div class="rec-header">
                            <h3>推荐方案</h3>
                            <button class="close-btn" onclick="hideRecPanel()">✕</button>
                        </div>
                        <div id="recList" class="rec-list"></div>
                    </div>

                    <!-- Input Area -->
                    <div class="input-area">
                        <div id="nodeStatus" class="node-status"></div>
                        <div class="input-row">
                            <textarea id="msgInput" rows="1" placeholder="输入差旅需求，如：北京到上海，下周一，1人..."></textarea>
                            <button class="send-btn" id="sendBtn" onclick="send()">
                                发送
                                <span class="shortcut">↵</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Graph Tab -->
            <div id="graphTab" class="tab-content">
                <div class="graph-view">
                    <h3>Agent 执行流程</h3>
                    <div class="flow-diagram">
                        <div class="flow-node start">👤 用户消息</div>
                        <div class="flow-arrow">↓</div>
                        <div class="flow-node intent">🧠 意图识别</div>
                        <div class="flow-arrow">↓</div>
                        <div class="flow-branch">
                            <div class="flow-node chat">💬 对话</div>
                            <div class="flow-node extractor">📋 信息提取</div>
                        </div>
                        <div class="flow-arrow">↓</div>
                        <div class="flow-node tmc_query">🔍 查询方案</div>
                        <div class="flow-arrow">↓</div>
                        <div class="flow-node recommend">🎯 智能推荐</div>
                        <div class="flow-arrow">↓</div>
                        <div class="flow-node booker">📦 预订执行</div>
                        <div class="flow-arrow">↓</div>
                        <div class="flow-node end">✓ 完成</div>
                    </div>
                </div>
            </div>

            <!-- State Tab -->
            <div id="stateTab" class="tab-content">
                <div class="state-view">
                    <h3>当前状态</h3>
                    <div class="controls">
                        <button class="refresh-btn" onclick="refreshState()">↻ 刷新状态</button>
                        <button class="clear-btn" onclick="clearState()">清空</button>
                    </div>
                    <pre id="stateDisplay">// 暂无会话，请先发起一次对话</pre>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
